<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navi Overlay</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-role="overlay">
  <div id="bounding-box" class="hidden">
    <div id="bbox-ring"></div>
  </div>

  <div id="tooltip" class="panel hidden">
    <span id="tooltip-text"></span>
  </div>

  <div id="step-hud" class="panel hidden">
    <div id="step-counter"></div>
    <div id="step-history"></div>
  </div>

  <div id="loading" class="hidden">
    <div id="loading-vignette"></div>
    <div id="loading-scanner" aria-hidden="true"></div>
    <div id="loading-panel">
      <div id="loading-bar"></div>
      <span id="loading-text">Navi is thinking...</span>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
