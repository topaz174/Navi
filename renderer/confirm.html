<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navi Confirm</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-role="confirm">
  <div id="confirm-done" class="panel hidden">
    <p id="confirm-text">Navi thinks the task is done — looks right?</p>
    <div id="confirm-buttons">
      <button id="btn-yes" class="navi-btn">Yes</button>
      <button id="btn-continue" class="navi-btn secondary">Keep going</button>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
